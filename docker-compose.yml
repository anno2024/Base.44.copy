services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BASE44_APP_ID: ${VITE_BASE44_APP_ID}
        VITE_BASE44_APP_BASE_URL: ${VITE_BASE44_APP_BASE_URL}
        VITE_BASE44_FUNCTIONS_VERSION: ${VITE_BASE44_FUNCTIONS_VERSION}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    ports:
      - "4000:4000"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    pull_policy: always
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    env_file:
      - backend/.env
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "set -e; \
until OLLAMA_HOST=$${OLLAMA_HOST} ollama list >/dev/null 2>&1; do \
  echo 'Waiting for Ollama...'; \
  sleep 2; \
done; \
for MODEL in $${OLLAMA_MODEL} $${OLLAMA_EMBED_MODEL}; do \
  if [ -n \"$${MODEL}\" ]; then \
    echo \"Pulling $${MODEL}\"; \
    OLLAMA_HOST=$${OLLAMA_HOST} ollama pull $${MODEL}; \
  fi; \
done;"
      ]
    restart: "no"

volumes:
  ollama-data:
