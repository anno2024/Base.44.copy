version: '3.9'
services:
  backend:
    build:
      context: ./server
    env_file:
      - ./server/.env.example
    ports:
      - "4000:4000"
    volumes:
      - ./storage/uploads:/app/storage/uploads
      - ./server/prisma:/app/prisma
  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_BASE44_APP_ID=base-44-app
      - VITE_BASE44_APP_BASE_URL=http://localhost:5173
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
